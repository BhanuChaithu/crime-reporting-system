<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Crime Reporting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/translations.js"></script>
    <script src="js/i18n.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger sticky-top shadow">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="images/logo.png" alt="Logo" style="height: 30px; margin-right: 10px;">
                <span data-i18n="admin_panel">Crime Reporting System - Admin Panel</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><span class="navbar-text text-light me-3 fw-bold" data-i18n="admin_panel">Admin
                            Panel</span></li>
                    <li class="nav-item"><button class="btn btn-danger btn-sm rounded-pill px-3 shadow"
                            onclick="logout()"><i class="fas fa-sign-out-alt me-1"></i> <span
                                data-i18n="nav_logout">Logout</span></button></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="crimes-tab" data-bs-toggle="tab" data-bs-target="#crimes"
                    type="button" data-i18n="nav_all_reports">Crime Reports</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="users-tab" data-bs-toggle="tab" data-bs-target="#users" type="button"
                    data-i18n="admin_manage_users">Manage Users</button>
            </li>
        </ul>
        <div class="tab-content mt-3" id="myTabContent">
            <!-- Crimes Tab -->
            <div class="tab-pane fade show active" id="crimes">
                <h4 data-i18n="nav_all_reports">All Crime Reports</h4>
                <div id="reportsList"></div>
            </div>
            <!-- Users Tab -->
            <div class="tab-pane fade" id="users">
                <h4 data-i18n="admin_user_management">User Management</h4>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th data-i18n="table_username">Username</th>
                            <th data-i18n="table_email">Email</th>
                            <th data-i18n="table_role">Role</th>
                            <th data-i18n="table_action">Action</th>
                        </tr>
                    </thead>
                    <tbody id="usersList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Assign Modal -->
    <div class="modal fade" id="assignModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" data-i18n="admin_manage_case">Manage Case</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="assignId">
                    <div class="mb-3">
                        <label data-i18n="admin_assign_police">Assign to Police Officer</label>
                        <select id="policeSelect" class="form-select">
                            <option value="" data-i18n="admin_select_officer">-- Select Officer --</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label data-i18n="report_status">Update Status</label>
                        <select id="adminStatus" class="form-select">
                            <option value="Pending" data-i18n="status_pending">Pending</option>
                            <option value="Under Investigation" data-i18n="status_investigating">Under Investigation
                            </option>
                            <option value="Closed" data-i18n="status_closed">Closed</option>
                        </select>
                    </div>
                    <button onclick="saveAssignment()" class="btn btn-primary w-100" data-i18n="action_save">Save
                        Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <footer class="bg-dark text-white text-center py-3 fixed-bottom">
        <div class="container">
            <p class="mb-0" data-i18n="footer_copyright">&copy; 2025 Crime Reporting System. All Rights Reserved.</p>
            <small data-i18n="footer_tagline">Designed for Safer Communities</small>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        checkAuth();

        // Initialize language selector in navbar
        document.addEventListener('DOMContentLoaded', function () {
            const navbarArea = document.querySelector('.navbar .container');
            if (navbarArea) {
                const navLinks = navbarArea.querySelector('.navbar-nav');
                if (navLinks) {
                    const li = document.createElement('li');
                    li.className = 'nav-item ms-3';
                    li.innerHTML = `
                        <div class="dropdown">
                            <button class="btn btn-dark btn-sm rounded-pill px-3 shadow" type="button" data-bs-toggle="dropdown">
                                <i class="fas fa-globe me-1"></i> <span id="current-lang-text">${i18n.getLanguageName(i18n.getCurrentLanguage())}</span>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                                <li><a class="dropdown-item lang-btn" href="#" data-lang="en">🇬🇧 English</a></li>
                                <li><a class="dropdown-item lang-btn" href="#" data-lang="te">🇮🇳 తెలుగు</a></li>
                                <li><a class="dropdown-item lang-btn" href="#" data-lang="hi">🇮🇳 हिंदी</a></li>
                            </ul>
                        </div>
                    `;
                    navLinks.insertBefore(li, navLinks.lastElementChild);
                    i18n.attachLanguageListeners();
                }
            }
        });

        let allUsers = [];

        // Load Users
        const loadUsers = async () => {
            const res = await apiFetch('/users');
            if (res.ok) {
                allUsers = await res.json();
                const tbody = document.getElementById('usersList');
                tbody.innerHTML = '';
                allUsers.forEach(u => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${u.username}</td>
                            <td>${u.email}</td>
                            <td><span class="badge ${u.role === 'admin' ? 'bg-danger' : u.role === 'police' ? 'bg-info' : 'bg-secondary'}" data-i18n="role_${u.role}">${i18n.t('role_' + u.role)}</span></td>
                            <td>
                                ${u.role !== 'admin' ? `<button class="btn btn-sm btn-danger" onclick="deleteUser('${u.id}')" data-i18n="action_delete">${i18n.t('action_delete')}</button>` : ''}
                            </td>
                        </tr>
                    `;
                });
                populatePoliceSelect();
            }
        };

        // Populate Police Select
        function populatePoliceSelect() {
            const select = document.getElementById('policeSelect');
            select.innerHTML = `<option value="" data-i18n="admin_select_officer">${i18n.t('admin_select_officer')}</option>`;
            allUsers.filter(u => u.role === 'police').forEach(p => {
                select.innerHTML += `<option value="${p.id}">${p.username}</option>`;
            });
        }

        // Delete User
        async function deleteUser(id) {
            if (confirm(i18n.t('confirm_delete_user'))) {
                const res = await apiFetch(`/users/${id}`, 'DELETE');
                if (res.ok) {
                    alert(i18n.t('msg_delete_success'));
                    loadUsers();
                }
                else alert(i18n.t('msg_delete_error'));
            }
        }

        // Load Reports
        const loadReports = async () => {
            const res = await apiFetch('/crime');
            const data = await res.json();
            const list = document.getElementById('reportsList');
            list.className = 'row';
            list.innerHTML = '';

            data.forEach(report => {
                let badge = 'bg-warning';
                let statusKey = 'status_pending';
                if (report.status === 'Under Investigation') {
                    badge = 'bg-info';
                    statusKey = 'status_investigating';
                }
                if (report.status === 'Closed') {
                    badge = 'bg-success';
                    statusKey = 'status_closed';
                }

                const crimeTypeKey = 'crime_' + report.type.toLowerCase();
                const crimeType = i18n.t(crimeTypeKey);
                const statusText = i18n.t(statusKey);

                list.innerHTML += `
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="card h-100 border-0 shadow-sm" style="background: rgba(255, 255, 255, 0.95); border-radius: 15px; overflow: hidden;">
                            <div class="card-header bg-transparent border-0 d-flex justify-content-between align-items-center pt-3 px-3">
                                <h5 class="card-title mb-0 fw-bold text-dark"><i class="fas fa-folder-open me-2 text-primary"></i> <span data-i18n="${crimeTypeKey}">${crimeType}</span></h5>
                                <span class="badge ${badge} rounded-pill px-3 py-2 shadow-sm" data-i18n="${statusKey}">${statusText}</span>
                            </div>
                            <div class="card-body px-3 pt-2">
                                <p class="card-text text-muted mb-3" style="font-size: 0.9rem; line-height: 1.5;">${report.description.substring(0, 100)}...</p>
                                
                                <div class="mb-2">
                                    <small class="text-secondary"><i class="fas fa-map-marker-alt me-1 text-danger"></i> ${report.location}</small>
                                </div>
                                <div class="mb-3">
                                    <small class="text-secondary"><i class="fas fa-calendar-alt me-1 text-primary"></i> ${report.date}</small>
                                </div>
                                
                                <div class="d-flex justify-content-between align-items-center bg-light p-2 rounded border border-secondary border-opacity-10 mb-3">
                                    <div>
                                        <small class="d-block text-muted" style="font-size: 0.75rem;" data-i18n="label_reporter">Reporter</small>
                                        <span class="fw-semibold text-dark" style="font-size: 0.85rem;">${report.reporter.username}</span>
                                    </div>
                                    <div class="text-end">
                                        <small class="d-block text-muted" style="font-size: 0.75rem;" data-i18n="label_assigned_officer">Assigned Officer</small>
                                        <span class="badge ${report.assignedOfficer ? 'bg-info' : 'bg-secondary'} text-white" style="font-size: 0.8rem;" data-i18n="${report.assignedOfficer ? '' : 'label_unassigned'}">
                                            ${report.assignedOfficer ? report.assignedOfficer.username : i18n.t('label_unassigned')}
                                        </span>
                                    </div>
                                </div>

                                <div class="d-grid gap-2">
                                    <button class="btn btn-outline-primary btn-sm rounded-pill shadow-sm" onclick="openAssign('${report.id}', '${report.assignedOfficer ? report.assignedOfficer.id : ''}', '${report.status}')">
                                        <i class="fas fa-tasks me-1"></i> <span data-i18n="admin_manage_case">Manage Case</span>
                                    </button>
                                </div>
                            </div>
                            <!-- Evidence Link Footer if needed, but managing is key here -->
                           ${report.evidence ? `
                            <div class="card-footer bg-transparent border-0 pb-3 px-3 text-center">
                                <a href="/${report.evidence}" target="_blank" class="text-decoration-none small text-secondary"><i class="fas fa-paperclip me-1"></i> <span data-i18n="action_view_details">View Evidence</span></a>
                            </div>` : ''}
                        </div>
                    </div>
                `;
            });
        };

        const assignModal = new bootstrap.Modal(document.getElementById('assignModal'));

        function openAssign(id, officerId, status) {
            document.getElementById('assignId').value = id;
            document.getElementById('policeSelect').value = officerId || "";
            document.getElementById('adminStatus').value = status;
            assignModal.show();
        }

        async function saveAssignment() {
            const id = document.getElementById('assignId').value;
            const assignedTo = document.getElementById('policeSelect').value;
            const status = document.getElementById('adminStatus').value;

            const res = await apiFetch(`/crime/${id}`, 'PUT', { assignedTo, status });
            if (res.ok) {
                assignModal.hide();
                loadReports();
            } else {
                alert(i18n.t('msg_error_submit'));
            }
        }

        loadUsers();
        loadReports();
    </script>
</body>

</html>
