<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Crime Location Map - Crime Reporting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="js/translations.js"></script>
    <script src="js/i18n.js"></script>
    <style>
        #map {
            height: 550px;
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .leaflet-popup-content-wrapper {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            border-radius: 12px;
        }

        .citizen-map-header {
            padding: 40px 0;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('images/banner.png');
            background-size: cover;
            background-position: center;
            border-radius: 15px;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="images/logo.png" alt="Logo" style="height: 30px; margin-right: 10px;">
                <span data-i18n="brand_full">Crime Reporting System</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="nav-links">
                    <li class="nav-item"><a class="nav-link" href="user-dashboard.html"><i class="fas fa-home"></i>
                            <span data-i18n="nav_home">Home</span></a></li>
                    <li class="nav-item"><a class="nav-link active" href="citizen-map.html"><i
                                class="fas fa-map-marked-alt"></i> <span data-i18n="nav_community_map">Community
                                Map</span></a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <div class="citizen-map-header text-center text-white shadow">
            <h2 class="fw-bold" data-i18n="map_community_title">Community Safety Awareness Map</h2>
            <p class="lead opacity-75" data-i18n="map_community_subtitle">Real-time visualization of safety incidents in
                your locality.</p>
        </div>

        <div id="map"></div>
    </div>

    <footer class="bg-dark text-white text-center py-3">
        <div class="container">
            <p class="mb-0" data-i18n="footer_copyright">&copy; 2025 Crime Reporting System. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/main.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        const navLinks = document.getElementById('nav-links');
        if (user) {
            let dashboard = (user.role === 'police') ? 'police-dashboard.html' : 'user-dashboard.html';
            navLinks.innerHTML = `
                <li class="nav-item"><a class="nav-link" href="${dashboard}"><i class="fas fa-tachometer-alt"></i> <span data-i18n="nav_dashboard">${i18n.t('nav_dashboard')}</span></a></li>
                <li class="nav-item"><a class="nav-link active" href="citizen-map.html"><i class="fas fa-map-marked-alt"></i> <span data-i18n="nav_crime_map">${i18n.t('nav_crime_map')}</span></a></li>
                <li class="nav-item ms-2"><button class="btn btn-danger btn-sm rounded-pill px-3 shadow" onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span data-i18n="nav_logout">${i18n.t('nav_logout')}</span></button></li>
            `;
        }

        // Initialize language selector in navbar
        document.addEventListener('DOMContentLoaded', function () {
            const navbarArea = document.querySelector('.navbar .container');
            if (navbarArea) {
                const navLinksArea = navbarArea.querySelector('.navbar-nav');
                if (navLinksArea) {
                    const li = document.createElement('li');
                    li.className = 'nav-item ms-3';
                    li.innerHTML = `
                        <div class="dropdown">
                            <button class="btn btn-dark btn-sm rounded-pill px-3 shadow" type="button" data-bs-toggle="dropdown">
                                <i class="fas fa-globe me-1 text-primary"></i> <span id="current-lang-text">${i18n.getLanguageName(i18n.getCurrentLanguage())}</span>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                                <li><a class="dropdown-item lang-btn" href="#" data-lang="en">🇬🇧 English</a></li>
                                <li><a class="dropdown-item lang-btn" href="#" data-lang="te">🇮🇳 తెలుగు</a></li>
                                <li><a class="dropdown-item lang-btn" href="#" data-lang="hi">🇮🇳 हिंदी</a></li>
                            </ul>
                        </div>
                    `;
                    navLinksArea.appendChild(li);
                    i18n.attachLanguageListeners();
                }
            }
        });

        const map = L.map('map').setView([20.5937, 78.9629], 5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        async function loadMarkers() {
            const res = await apiFetch('/crime');
            const reports = await res.json();

            for (const report of reports) {
                const coords = await geocodeAddress(report.location);
                if (coords) {
                    const statusKey = 'status_' + (report.status === 'Under Investigation' ? 'investigating' : report.status.toLowerCase());
                    const crimeTypeKey = 'crime_' + report.type.toLowerCase();

                    marker.bindPopup(`
                        <div class="p-2" style="max-width: 250px;">
                            <h6 class="fw-bold mb-1" data-i18n="${crimeTypeKey}">${i18n.t(crimeTypeKey)}</h6>
                            <p class="small text-muted mb-2"><i class="fas fa-map-marker-alt text-danger me-1"></i> ${report.location}</p>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="badge bg-primary" data-i18n="${statusKey}">${i18n.t(statusKey)}</span>
                                <small class="text-muted">${report.date}</small>
                            </div>
                        </div>
                    `);
                }
            }
        }

        loadMarkers();
    </script>
</body>

</html>
