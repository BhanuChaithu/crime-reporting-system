<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Dashboard - Crime Reporting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/translations.js"></script>
    <script src="js/i18n.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="images/logo.png" alt="Logo" style="height: 30px; margin-right: 10px;">
                <span data-i18n="dashboard_citizen">Crime Reporting System - Citizen Dashboard</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><span class="nav-link text-light me-2"><i class="fas fa-user"></i> <span
                                data-i18n="dashboard_welcome">Welcome</span>,
                            Citizen</span></li>
                    <li class="nav-item"><a class="nav-link" href="report.html?type=Theft"><i class="fas fa-mask"></i>
                            <span data-i18n="nav_theft">Theft</span></a></li>
                    <li class="nav-item"><a class="nav-link" href="report.html?type=Assault"><i
                                class="fas fa-user-injured"></i> <span data-i18n="nav_assault">Assault</span></a></li>
                    <li class="nav-item"><a class="nav-link" href="report.html?type=Cybercrime"><i
                                class="fas fa-user-secret"></i> <span data-i18n="nav_cybercrime">Cybercrime</span></a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="report.html?type=Harassment"><i
                                class="fas fa-exclamation-triangle"></i> <span
                                data-i18n="nav_harassment">Harassment</span></a></li>
                    <li class="nav-item"><a class="nav-link" href="report.html?type=Other"><i
                                class="fas fa-question-circle"></i> <span data-i18n="nav_other">Other</span></a></li>
                    <li class="nav-item"><a class="nav-link" href="citizen-map.html"><i
                                class="fas fa-map-marked-alt"></i> <span data-i18n="nav_crime_map">Crime Location
                                Map</span></a></li>
                    <li class="nav-item"><button class="btn btn-danger btn-sm rounded-pill px-3 shadow ms-2"
                            onclick="logout()"><i class="fas fa-sign-out-alt me-1"></i> <span
                                data-i18n="nav_logout">Logout</span></button></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">

            <div class="col-md-12">
                <h4 class="mb-3" data-i18n="dashboard_my_reports">My Reports</h4>
                <div id="reportsList">
                    <!-- Reports will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 fixed-bottom">
        <div class="container">
            <p class="mb-0">&copy; 2025 Crime Reporting System. All Rights Reserved.</p>
            <small>Designed for Safer Communities</small>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        // Initialize language selector
        document.addEventListener('DOMContentLoaded', function () {
            const navbar = document.querySelector('.navbar');
            if (navbar) {
                i18n.initLanguageSelector(navbar);
            }
        });

        checkAuth();
        checkRole('citizen');

        const loadReports = async () => {
            const res = await apiFetch('/crime');
            const data = await res.json();
            const list = document.getElementById('reportsList');
            list.innerHTML = '';

            if (data.length === 0) {
                list.innerHTML = `<div class="alert alert-info text-center">${i18n.t('dashboard_no_reports')}</div>`;
                return;
            }

            data.forEach(report => {
                let badgeClass = 'bg-secondary text-white'; // Grey for Pending
                let statusIcon = 'fa-clock';
                let statusText = i18n.t('status_pending');
                if (report.status === 'Under Investigation') {
                    badgeClass = 'bg-info text-white';
                    statusIcon = 'fa-search';
                    statusText = i18n.t('status_investigating');
                }
                if (report.status === 'Closed') {
                    badgeClass = 'bg-success text-white';
                    statusIcon = 'fa-check-circle';
                    statusText = i18n.t('status_closed');
                }

                let typeIcon = 'fa-exclamation-circle';
                const crimeType = i18n.t('crime_' + report.type.toLowerCase());
                if (report.type === 'Theft') typeIcon = 'fa-mask';
                if (report.type === 'Assault') typeIcon = 'fa-user-injured';
                if (report.type === 'Cybercrime') typeIcon = 'fa-user-secret';
                if (report.type === 'Harassment') typeIcon = 'fa-exclamation-triangle';

                list.innerHTML += `
                    <div class="card dashboard-card mb-4 border-0 shadow-sm" style="transition: transform 0.3s;">
                        <div class="card-header bg-transparent border-bottom-0 d-flex justify-content-between align-items-center pt-3 px-3">
                            <h5 class="mb-0 text-dark fw-bold"><i class="fas ${typeIcon} text-primary me-2"></i>${crimeType}</h5>
                            <span class="badge ${badgeClass} px-3 py-2 rounded-pill shadow-sm">
                                <i class="fas ${statusIcon} me-1"></i> ${statusText}
                            </span>
                        </div>
                        <div class="card-body px-3 pb-3">
                            <p class="text-muted mb-3" style="font-size: 0.95rem;">${report.description}</p>
                            
                            <div class="d-flex flex-wrap gap-3 mb-3 text-secondary" style="font-size: 0.9rem;">
                                <span><i class="fas fa-map-marker-alt text-danger me-1"></i> ${report.location}</span>
                                <span><i class="fas fa-calendar-alt text-primary me-1"></i> ${report.date}</span>
                                <span><i class="fas fa-clock text-info me-1"></i> ${report.time}</span>
                            </div>

                            ${report.evidence ? `
                                <div class="mb-2">
                                    <a href="/${report.evidence}" target="_blank" class="btn btn-sm btn-outline-secondary w-100">
                                        <i class="fas fa-paperclip me-1"></i> ${i18n.t('dashboard_view_evidence')}
                                    </a>
                                </div>
                            ` : ''}

                            ${report.remarks ? `
                                <div class="alert alert-light border-start border-4 border-warning mt-3 mb-0" style="background-color: #fff3cd33;">
                                    <strong class="text-warning"><i class="fas fa-comment-dots me-1"></i> ${i18n.t('dashboard_police_remarks')}</strong>
                                    <p class="mb-0 mt-1 small text-dark">${report.remarks}</p>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            });
        };



        loadReports();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
