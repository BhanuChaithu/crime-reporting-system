<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Crime Location Map - Crime Reporting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map {
            height: 500px;
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .leaflet-popup-content-wrapper {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="images/logo.png" alt="Logo" style="height: 30px; margin-right: 10px;">
                Crime Reporting System
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="nav-links">
                    <li class="nav-item"><a class="nav-link" href="user-dashboard.html"><i
                                class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="map.html"><i
                                class="fas fa-map-marked-alt"></i> Crime Location Map</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="text-center mb-4">
            <h2 class="text-white">Interactive Crime Map</h2>
            <p class="lead text-white-50">Visualizing reported incidents for community safety.</p>
        </div>
        <div id="map"></div>
    </div>

    <footer class="bg-dark text-white text-center py-3">
        <div class="container">
            <p class="mb-0">&copy; 2025 Crime Reporting System. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/main.js"></script>
    <script>
        const map = L.map('map').setView([20.5937, 78.9629], 5); // Center of India

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        async function loadMarkers() {
            const res = await apiFetch('/crime');
            const reports = await res.json();

            for (const report of reports) {
                const coords = await geocodeAddress(report.location);
                if (coords) {
                    const marker = L.marker([coords.lat, coords.lon]).addTo(map);
                    marker.bindPopup(`
                        <div class="p-2">
                            <h6 class="fw-bold mb-1">${report.type}</h6>
                            <p class="small text-muted mb-1">${report.location}</p>
                            <span class="badge bg-primary mb-2">${report.status}</span>
                            <br>
                            <a href="report-details.html?id=${report.id}" class="btn btn-sm btn-outline-primary py-0 px-2 mt-1">View Details</a>
                        </div>
                    `);
                }
            }
        }

        loadMarkers();
    </script>
</body>

</html>
