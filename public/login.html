<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title data-i18n-title="login_title">Login - Crime Reporting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/translations.js"></script>
    <script src="js/i18n.js"></script>
</head>

<body>
    <div class="d-flex align-items-center justify-content-center"
        style="min-height: 85vh; background: linear-gradient(rgba(15, 32, 39, 0.8), rgba(44, 83, 100, 0.8)), url('images/banner.png'); background-size: cover; background-position: center;">
        <div class="auth-card p-4 p-md-5"
            style="width: 100%; max-width: 450px; background: rgba(255, 255, 255, 0.95); border-radius: 15px; border-top: 5px solid #0d6efd;">
            <div class="text-center mb-4">
                <img src="images/logo.png" alt="Logo" style="height: 60px;">
                <h3 class="mt-3 fw-bold" style="color: #0f2027;" data-i18n="login_title">Welcome Back</h3>
                <p class="text-muted" data-i18n="login_subtitle">Login to your account</p>
            </div>
            <div id="alert" class="alert d-none"></div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="fw-bold text-dark" data-i18n="login_email">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="fas fa-envelope text-primary"></i></span>
                        <input type="email" id="email" class="form-control" data-i18n="login_email_placeholder"
                            placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="fw-bold text-dark" data-i18n="login_password">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="fas fa-lock text-primary"></i></span>
                        <input type="password" id="password" class="form-control" data-i18n="login_password_placeholder"
                            placeholder="Enter your password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fs-5 shadow-sm"
                    data-i18n="login_button">Login</button>
            </form>
            <p class="mt-4 text-center"><span data-i18n="login_no_account">Don't have an account?</span> <a
                    href="register.html" class="fw-bold text-decoration-none" style="color: #0d6efd;"
                    data-i18n="login_register_here">Register Here</a></p>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 fixed-bottom">
        <div class="container">
            <p class="mb-0" data-i18n="footer_copyright">&copy; 2025 Crime Reporting System. All Rights Reserved.</p>
            <small data-i18n="footer_tagline">Designed for Safer Communities</small>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Add language selector to header
            const authCard = document.querySelector('.auth-card .text-center');
            if (authCard) {
                const langSelector = document.createElement('div');
                langSelector.className = 'mb-3';
                langSelector.innerHTML = `
                    <div class="btn-group btn-group-sm" role="group">
                        <button type="button" class="btn btn-outline-secondary lang-btn ${i18n.getCurrentLanguage() === 'en' ? 'active' : ''}" data-lang="en">English</button>
                        <button type="button" class="btn btn-outline-secondary lang-btn ${i18n.getCurrentLanguage() === 'te' ? 'active' : ''}" data-lang="te">తెలుగు</button>
                        <button type="button" class="btn btn-outline-secondary lang-btn ${i18n.getCurrentLanguage() === 'hi' ? 'active' : ''}" data-lang="hi">हिंदी</button>
                    </div>
                `;
                authCard.insertBefore(langSelector, authCard.firstChild);
                i18n.attachLanguageListeners();
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const res = await apiFetch('/auth/login', 'POST', { email, password });
            const data = await res.json();

            if (res.ok) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data));

                if (data.role === 'admin') window.location.href = 'admin-dashboard.html';
                else if (data.role === 'police') window.location.href = 'police-dashboard.html';
                else window.location.href = 'user-dashboard.html';
            } else {
                const alert = document.getElementById('alert');
                alert.className = 'alert alert-danger';
                alert.textContent = data.message;
                alert.classList.remove('d-none');
            }
        });
    </script>
</body>

</html>
