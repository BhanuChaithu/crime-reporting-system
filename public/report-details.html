<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Report Details - Crime Reporting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/translations.js"></script>
    <script src="js/i18n.js"></script>
</head>

<body style="background: #f4f7f6; color: #333;">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html" data-i18n="brand_full">Crime Reporting System</a>
            <div class="d-flex align-items-center">
                <div class="dropdown me-3">
                    <button class="btn btn-outline-light btn-sm rounded-pill px-3 shadow" type="button"
                        data-bs-toggle="dropdown">
                        <i class="fas fa-globe me-1"></i> <span
                            id="current-lang-text">${i18n.getLanguageName(i18n.getCurrentLanguage())}</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                        <li><a class="dropdown-item lang-btn" href="#" data-lang="en">🇬🇧 English</a></li>
                        <li><a class="dropdown-item lang-btn" href="#" data-lang="te">🇮🇳 తెలుగు</a></li>
                        <li><a class="dropdown-item lang-btn" href="#" data-lang="hi">🇮🇳 हिंदी</a></li>
                    </ul>
                </div>
                <button class="btn btn-outline-light btn-sm" onclick="history.back()" data-i18n="nav_back">Back</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div id="reportDetail" class="card shadow-lg border-0 rounded-4 overflow-hidden"
            style="max-width: 800px; margin: auto;">
            <div class="card-body p-0 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2" data-i18n="detail_loading">Loading details...</p>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        checkAuth();
        const urlParams = new URLSearchParams(window.location.search);
        const reportId = urlParams.get('id');

        const loadReport = async () => {
            if (!reportId) return alert('No report ID provided');

            // Initialize language selector listeners
            i18n.attachLanguageListeners();

            const res = await apiFetch(`/crime/${reportId}`);
            if (!res.ok) {
                document.getElementById('reportDetail').innerHTML = `<div class="p-5 text-center"><h5 data-i18n="detail_not_found">${i18n.t('detail_not_found')}</h5></div>`;
                return;
            }
            const report = await res.json();

            let badge = 'bg-secondary';
            let statusKey = 'status_pending';
            if (report.status === 'Under Investigation') {
                badge = 'bg-info';
                statusKey = 'status_investigating';
            }
            if (report.status === 'Closed') {
                badge = 'bg-success';
                statusKey = 'status_closed';
            }

            const crimeTypeKey = 'crime_' + report.type.toLowerCase();

            document.getElementById('reportDetail').innerHTML = `
                <div class="card-header bg-white border-0 p-4 d-flex justify-content-between align-items-center">
                    <div>
                        <span class="badge ${badge} p-2 px-3 rounded-pill mb-2" data-i18n="${statusKey}">${i18n.t(statusKey)}</span>
                        <h2 class="fw-bold mb-0" data-i18n="${crimeTypeKey}">${i18n.t(crimeTypeKey)}</h2>
                        <p class="text-muted mb-0"><span data-i18n="detail_case_id">${i18n.t('detail_case_id')}</span>: #${report.id}</p>
                    </div>
                    <div class="text-end">
                        <i class="fas fa-file-contract text-primary fa-3x"></i>
                    </div>
                </div>
                <div class="card-body p-4 pt-0">
                    <hr>
                    <div class="row g-4">
                         <div class="col-md-6">
                            <label class="fw-bold text-muted small d-block" data-i18n="map_location">LOCATION</label>
                            <p class="fs-5"><i class="fas fa-map-marker-alt text-danger me-2"></i> ${report.location}</p>
                        </div>
                        <div class="col-md-6">
                            <label class="fw-bold text-muted small d-block" data-i18n="report_date">DATE & TIME</label>
                            <p class="fs-5"><i class="fas fa-calendar-alt text-primary me-2"></i> ${report.date} <span data-i18n="detail_at">${i18n.t('detail_at')}</span> ${report.time}</p>
                        </div>
                        <div class="col-12">
                            <label class="fw-bold text-muted small d-block" data-i18n="report_description">DESCRIPTION</label>
                            <p class="bg-light p-3 rounded shadow-sm">${report.description}</p>
                        </div>
                         <div class="col-md-6">
                            <label class="fw-bold text-muted small d-block" data-i18n="label_reporter">REPORTER</label>
                            <p class="mb-0"><strong>${report.reporter.username}</strong></p>
                            <p class="text-muted small">${report.reporter.email}</p>
                        </div>
                        <div class="col-md-6">
                            <label class="fw-bold text-muted small d-block" data-i18n="label_assigned_officer">ASSIGNED OFFICER</label>
                            <p>${report.assignedOfficer ? `<strong>Officer ${report.assignedOfficer.username}</strong>` : `<span class="text-muted italic" data-i18n="detail_not_assigned">${i18n.t('detail_not_assigned')}</span>`}</p>
                        </div>
                         ${report.evidence ? `
                        <div class="col-12">
                            <label class="fw-bold text-muted small d-block" data-i18n="report_evidence">EVIDENCE</label>
                            <div class="mt-2">
                                <a href="/${report.evidence}" target="_blank" class="btn btn-outline-primary shadow-sm rounded-pill px-4">
                                    <i class="fas fa-paperclip me-2"></i><span data-i18n="dashboard_view_evidence">View Evidence Document/Image</span>
                                </a>
                            </div>
                        </div>` : ''}
                        
                         ${report.remarks ? `
                        <div class="col-12">
                            <div class="alert alert-info border-0 shadow-sm mt-3">
                                <h6 class="fw-bold"><i class="fas fa-sticky-note me-2"></i><span data-i18n="detail_notes">${i18n.t('detail_notes')}</span></h6>
                                <p class="mb-0">${report.remarks}</p>
                            </div>
                        </div>` : ''}
                    </div>
                </div>
            `;
        };

        loadReport();
    </script>
</body>

</html>
