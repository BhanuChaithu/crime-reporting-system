<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Crime Location Map - Police Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="js/translations.js"></script>
    <script src="js/i18n.js"></script>
    <style>
        #map {
            height: 600px;
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body style="background: #0f2027; color: white;">
    <nav class="navbar navbar-expand-lg navbar-dark bg-info sticky-top shadow">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="images/logo.png" alt="Logo" style="height: 30px; margin-right: 10px;">
                <span data-i18n="map_strategic_title">Police Dashboard - Strategic Map</span>
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link text-dark" href="police-dashboard.html"><i
                                class="fas fa-home"></i> <span data-i18n="nav_dashboard">Dashboard</span></a></li>
                    <li class="nav-item"><a class="nav-link active text-dark fw-bold" href="police-map.html"><i
                                class="fas fa-map-marked-alt"></i> <span data-i18n="nav_strategic_map">Strategic
                                Map</span></a></li>
                    <li class="nav-item"><button class="btn btn-danger btn-sm rounded-pill px-3 shadow ms-3"
                            onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span
                                data-i18n="nav_logout">Logout</span></button></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid p-4">
        <div class="row">
            <div class="col-md-12">
                <div class="card bg-dark text-white border-0 shadow">
                    <div class="card-header bg-transparent border-0 d-flex justify-content-between align-items-center">
                        <h4 class="mb-0 fw-bold"><i class="fas fa-satellite me-2"></i> <span
                                data-i18n="map_hotspot_tracking">Hotspot Tracking</span></h4>
                        <span class="badge bg-danger" data-i18n="map_live_intel">Live Intel</span>
                    </div>
                    <div class="card-body p-0">
                        <div id="map"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/main.js"></script>
    <script>
        checkAuth();

        // Initialize language selector in navbar
        document.addEventListener('DOMContentLoaded', function () {
            const navbarArea = document.querySelector('.navbar .container');
            if (navbarArea) {
                const navLinksArea = navbarArea.querySelector('.navbar-nav');
                if (navLinksArea) {
                    const li = document.createElement('li');
                    li.className = 'nav-item ms-3';
                    li.innerHTML = `
                        <div class="dropdown">
                            <button class="btn btn-info btn-sm rounded-pill px-3 shadow" type="button" data-bs-toggle="dropdown">
                                <i class="fas fa-globe me-1"></i> <span id="current-lang-text">${i18n.getLanguageName(i18n.getCurrentLanguage())}</span>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                                <li><a class="dropdown-item lang-btn" href="#" data-lang="en">🇬🇧 English</a></li>
                                <li><a class="dropdown-item lang-btn" href="#" data-lang="te">🇮🇳 తెలుగు</a></li>
                                <li><a class="dropdown-item lang-btn" href="#" data-lang="hi">🇮🇳 हिंदी</a></li>
                            </ul>
                        </div>
                    `;
                    navLinksArea.appendChild(li);
                    i18n.attachLanguageListeners();
                }
            }
        });

        const map = L.map('map').setView([20.5937, 78.9629], 5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        async function loadMarkers() {
            const res = await apiFetch('/crime');
            const reports = await res.json();

            for (const report of reports) {
                const coords = await geocodeAddress(report.location);
                if (coords) {
                    const color = report.status === 'Closed' ? '#27ae60' : (report.status === 'Under Investigation' ? '#3498db' : '#e74c3c');

                    const marker = L.circleMarker([coords.lat, coords.lon], {
                        radius: 8,
                        fillColor: color,
                        color: "#fff",
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.8
                    }).addTo(map);

                    const statusKey = 'status_' + (report.status === 'Under Investigation' ? 'investigating' : report.status.toLowerCase());
                    const crimeTypeKey = 'crime_' + report.type.toLowerCase();

                    marker.bindPopup(`
                        <div class="text-dark p-2" style="min-width: 200px;">
                            <h6 class="fw-bold mb-1" data-i18n="${crimeTypeKey}">${i18n.t(crimeTypeKey)}</h6>
                            <p class="small mb-1"><i class="fas fa-map-marker-alt text-danger me-1"></i> ${report.location}</p>
                            <p class="small mb-2 text-muted">${report.description.substring(0, 50)}...</p>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="badge" style="background-color: ${color}" data-i18n="${statusKey}">${i18n.t(statusKey)}</span>
                                <a href="report-details.html?id=${report.id}" class="btn btn-link btn-sm p-0" data-i18n="map_full_intel">${i18n.t('map_full_intel')}</a>
                            </div>
                        </div>
                    `);
                }
            }
        }

        loadMarkers();

        function logout() {
            localStorage.removeItem('user');
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
