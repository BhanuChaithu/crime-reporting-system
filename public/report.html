<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Report Crime - Crime Reporting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="js/translations.js"></script>
    <script src="js/i18n.js"></script>
    <style>
        #reportMap {
            height: 300px;
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
            border: 2px solid #ddd;
        }

        .location-hint {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="images/logo.png" alt="Logo" style="height: 30px; margin-right: 10px;">
                <span data-i18n="brand_full">Crime Reporting System</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="nav-links">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-home"></i> <span
                                data-i18n="nav_home">Home</span></a></li>
                    <li class="nav-item"><a class="nav-link" href="user-dashboard.html"><i
                                class="fas fa-tachometer-alt"></i> <span data-i18n="nav_dashboard">Dashboard</span></a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0 overflow-hidden">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 id="formTitle" class="mb-0"><i class="fas fa-file-alt"></i> <span
                                data-i18n="report_title">Report a Crime</span></h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="reportForm">
                            <div class="mb-3">
                                <label class="fw-bold" data-i18n="report_crime_type">Crime Type</label>
                                <input type="text" id="type" class="form-control" readonly>
                            </div>
                            <div class="mb-3">
                                <label class="fw-bold" data-i18n="report_description">Description</label>
                                <textarea id="description" class="form-control" rows="4" required
                                    data-i18n="report_description_placeholder"
                                    placeholder="Describe the incident in detail..."></textarea>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="fw-bold" data-i18n="report_date">Date</label>
                                    <input type="date" id="date" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="fw-bold" data-i18n="report_time">Time</label>
                                    <input type="time" id="time" class="form-control" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="fw-bold" data-i18n="report_location">Pin Location on Map</label>
                                <div id="reportMap"></div>
                                <p class="location-hint"><i class="fas fa-info-circle me-1"></i><span
                                        data-i18n="report_location_hint">Click on the map to pin
                                        the exact location of the incident.</span></p>
                                <input type="text" id="location" class="form-control mt-2" required
                                    data-i18n="report_location_placeholder"
                                    placeholder="Location address will appear here..." readonly>
                            </div>
                            <div class="mb-4">
                                <label class="fw-bold" data-i18n="report_evidence">Evidence (Image/Doc)</label>
                                <input type="file" id="evidence" class="form-control">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-3 fs-5 fw-bold shadow-sm"
                                data-i18n="report_submit">Submit
                                Official Report</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Success Modal -->
            <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header bg-success text-white">
                            <h5 class="modal-title"><i class="fas fa-check-circle me-2"></i><span
                                    data-i18n="msg_report_success">Success</span></h5>
                        </div>
                        <div class="modal-body text-center py-4">
                            <div class="mb-3">
                                <i class="fas fa-file-invoice fa-4x text-success mb-3"></i>
                                <h4 class="mb-2" id="modalTrackingIdDisplay"></h4>
                                <p class="text-muted" data-i18n="msg_receipt_ready">Your report has been submitted. You
                                    can now download your official Crime Receipt.</p>
                            </div>
                        </div>
                        <div class="modal-footer flex-column">
                            <button type="button" class="btn btn-success w-100 py-2 mb-2" id="downloadReceiptBtn">
                                <i class="fas fa-download me-2"></i><span data-i18n="action_download_receipt">Download
                                    Crime Receipt</span>
                            </button>
                            <button type="button" class="btn btn-outline-secondary w-100" id="goToDashboardBtn">
                                <span data-i18n="nav_dashboard">Dashboard</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3">
        <div class="container">
            <p class="mb-0">&copy; 2025 Crime Reporting System. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize language selector
        document.addEventListener('DOMContentLoaded', function () {
            const navbar = document.querySelector('.navbar');
            if (navbar) {
                i18n.initLanguageSelector(navbar);
            }
        });

        checkAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type') || 'Other';
        document.getElementById('type').value = i18n.t('crime_' + type.toLowerCase());
        document.getElementById('formTitle').innerHTML = `<i class="fas fa-file-alt"></i> ${i18n.t('report_title')} - ${i18n.t('crime_' + type.toLowerCase())}`;

        // Initialize Map
        const map = L.map('reportMap').setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let marker;

        // Try to get user's current location to center map
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                map.setView([position.coords.latitude, position.coords.longitude], 13);
            });
        }

        map.on('click', async (e) => {
            const { lat, lng } = e.latlng;

            if (marker) marker.setLatLng(e.latlng);
            else marker = L.marker(e.latlng).addTo(map);

            // Reverse Geocoding
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                const data = await res.json();
                document.getElementById('location').value = data.display_name || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
            } catch (err) {
                document.getElementById('location').value = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
            }
        });

        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!document.getElementById('location').value) {
                return alert(i18n.t('msg_select_location'));
            }

            const formData = new FormData();
            formData.append('type', document.getElementById('type').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('date', document.getElementById('date').value);
            formData.append('time', document.getElementById('time').value);
            formData.append('location', document.getElementById('location').value);

            const file = document.getElementById('evidence').files[0];
            if (file) formData.append('evidence', file);

            const res = await apiUpload('/crime', formData);
            if (res.ok) {
                const reportData = await res.json();
                const user = JSON.parse(localStorage.getItem('user'));

                // Show tracking ID in modal
                document.getElementById('modalTrackingIdDisplay').innerText = `${i18n.t('label_tracking_id')}: ${reportData.trackingId}`;

                // Handle Success Modal
                const successModal = new bootstrap.Modal(document.getElementById('successModal'));
                successModal.show();

                // Setup Download Button
                document.getElementById('downloadReceiptBtn').onclick = () => {
                    generatePDF(reportData, user);
                };

                // Setup Dashboard Button
                document.getElementById('goToDashboardBtn').onclick = () => {
                    window.location.href = 'user-dashboard.html';
                };

            } else {
                alert(i18n.t('msg_error_submit'));
            }
        });

        async function generatePDF(report, user) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Header
            doc.setFillColor(33, 37, 41); // Dark theme matching the app
            doc.rect(0, 0, 210, 40, 'F');

            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22);
            doc.text(i18n.t('pdf_title'), 105, 25, { align: 'center' });

            // Content
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(12);

            const tableData = [
                [i18n.t('label_tracking_id'), report.trackingId],
                [i18n.t('pdf_reported_by'), user.username || 'N/A'],
                [i18n.t('pdf_crime_type'), report.type],
                [i18n.t('pdf_date'), report.date],
                [i18n.t('pdf_time'), report.time],
                [i18n.t('pdf_location'), report.location],
                [i18n.t('pdf_description'), report.description],
                [i18n.t('pdf_status'), i18n.t('status_' + report.status.toLowerCase().replace(/ /g, '_')) || report.status]
            ];

            doc.autoTable({
                startY: 50,
                head: [[i18n.t('table_action'), 'Details']],
                body: tableData,
                theme: 'grid',
                headStyles: { fillColor: [0, 123, 255] },
                columnStyles: {
                    0: { fontStyle: 'bold', cellWidth: 50 },
                    1: { cellWidth: 'auto' }
                }
            });

            // Footer
            const finalY = doc.lastAutoTable.finalY + 20;
            doc.setFontSize(10);
            doc.setTextColor(100);
            doc.text(i18n.t('footer_copyright'), 105, finalY, { align: 'center' });
            doc.text("Generated on: " + new Date().toLocaleString(), 105, finalY + 7, { align: 'center' });

            doc.save(`Crime_Receipt_${report.trackingId}.pdf`);
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
